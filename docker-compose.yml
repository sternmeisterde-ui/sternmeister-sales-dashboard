services:
  # Next.js Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${HOST_PORT:-3008}:3008"
    # в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    # Env-variable whitelist. Only vars listed here reach the container.
    # Anything added to Dokploy's UI but NOT listed here is invisible to
    # the running process вҖ” hence SESSION_SECRET and the Telegram Bot
    # tokens need explicit entries below.
    # в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    environment:
      # Core runtime
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=3008
      # OS-level timezone (affects OS date commands, logs). Separate from
      # APP_TIMEZONE which drives app-side date parsing/display.
      - TZ=${TZ:-Europe/Berlin}
      - APP_TIMEZONE=${APP_TIMEZONE:-Europe/Berlin}
      - NEXT_TELEMETRY_DISABLED=1

      # Session signing (required in production вҖ” fail-loud if missing)
      - SESSION_SECRET=${SESSION_SECRET}
      - COOKIE_INSECURE=${COOKIE_INSECURE}

      # Databases вҖ” D1/R1 = roleplay, D2/R2 = OKK, analytics = Looker mirror
      - DATABASE_URL=${DATABASE_URL}
      - R1_DATABASE_URL=${R1_DATABASE_URL}
      - D2_OKK_DATABASE_URL=${D2_OKK_DATABASE_URL}
      - R2_OKK_DATABASE_URL=${R2_OKK_DATABASE_URL}
      - ANALYTICS_DATABASE_URL=${ANALYTICS_DATABASE_URL}
      - TRACKING_DATABASE_URL=${TRACKING_DATABASE_URL}
      # "daily" project: daily_active_managers + evaluation_error_reports.
      # Without this whitelist entry the var is invisible in the container and
      # src/lib/db/daily-db.ts falls back to a hardcoded URL (to be removed).
      - DAILY_DATABASE_URL=${DAILY_DATABASE_URL}
      # berater_bot Neon (read-only) вҖ” bot-roleplay enrichment of the funnel
      # В«РҡР»РёРөРҪСӮСӢВ» scoring. OPTIONAL: absent вҶ’ graceful no-op. Set value in Dokploy.
      - BERATER_BOT_DATABASE_URL=${BERATER_BOT_DATABASE_URL}
      # BGS DocFlow Neon (read-only) вҖ” external service (repo BGS_DocFlow) stats
      # tab: job-application automation for B2G students. OPTIONAL: absent вҶ’
      # graceful no-op. Set value in Dokploy.
      - DOCFLOW_DATABASE_URL=${DOCFLOW_DATABASE_URL}

      # Roleplay audio servers
      - D1_API_URL=${D1_API_URL}
      - R1_API_URL=${R1_API_URL}

      # ETL cron secret вҖ” protects /api/analytics/sync/cron from unauthorized calls
      - CRON_SECRET=${CRON_SECRET}

      # Call-analysis worker: soft time-box per chunk (ms). The pipeline
      # checkpoints and yields at this deadline; the analysis-cron tick
      # resumes it. Default 20 min (set in code) вҖ” override only for testing.
      - ANALYSIS_SOFT_DEADLINE_MS=${ANALYSIS_SOFT_DEADLINE_MS}
      # Set to "1" to enable batched Kommo discovery (bulk notes endpoints,
      # ~50x fewer requests). Keep unset until verified against prod Kommo вҖ”
      # see the flag comment in src/lib/analysis/pipeline.ts.
      - ANALYSIS_BATCH_DISCOVERY=${ANALYSIS_BATCH_DISCOVERY}

      # Kommo CRM
      - KOMMO_ACCESS_TOKEN=${KOMMO_ACCESS_TOKEN}
      - KOMMO_SUBDOMAIN=${KOMMO_SUBDOMAIN}
      # Legacy var name still read by src/lib/analysis/pipeline.ts at some
      # sites; retained for compatibility with existing Dokploy configs.
      - KOMMO_API_DOMAIN=${KOMMO_API_DOMAIN}
      # Token-source override. Set to "db" in Dokploy when KOMMO_ACCESS_TOKEN
      # is stale/revoked but you can't unset it вҖ” forces ensureKommoConfig
      # to skip env and load the freshly-rotated OAuth token from the
      # kommo_tokens DB table. See src/lib/kommo/client.ts:resolveKommoApiHost.
      - KOMMO_TOKEN_SOURCE=${KOMMO_TOKEN_SOURCE}

      # Telephony вҖ” direct CDR pull (CallGear + CloudTalk). Without these,
      # sync-telephony silently skips, dashboard call counts go stale within
      # ~15 min of the last manual backfill.
      - CALLGEAR_ACCESS_TOKEN=${CALLGEAR_ACCESS_TOKEN}
      - CLOUDTALK_API_ID=${CLOUDTALK_API_ID}
      - CLOUDTALK_API_SECRET=${CLOUDTALK_API_SECRET}

      # AI / transcription providers
      - XAI_API_KEY=${XAI_API_KEY}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}

      # Google Drive вҖ” РІСӢРіСҖСғР·РәР° Р·РІРҫРҪРәРҫРІ РІСӢРёРіСҖР°РҪРҪСӢС… СҒРҙРөР»РҫРә (С„РёСҮР° В«РҝР°РҝРәР° РҝРҫ
      # РҫРҝР»Р°СӮРөВ»). OAuth РҫСӮ РёРјРөРҪРё РҝРҫР»СҢР·РҫРІР°СӮРөР»СҸ, РҫРұР»Р°СҒСӮСҢ drive.file. Р‘РөР· СҚСӮРҫРіРҫ
      # whitelist РҝРөСҖРөРјРөРҪРҪСӢРө РҪРөРІРёРҙРёРјСӢ РІ РәРҫРҪСӮРөР№РҪРөСҖРө (Р»РҫРІСғСҲРәР° env-whitelist).
      - GOOGLE_OAUTH_CLIENT_ID=${GOOGLE_OAUTH_CLIENT_ID}
      - GOOGLE_OAUTH_CLIENT_SECRET=${GOOGLE_OAUTH_CLIENT_SECRET}
      - GOOGLE_OAUTH_REFRESH_TOKEN=${GOOGLE_OAUTH_REFRESH_TOKEN}
      - GDRIVE_ROOT_FOLDER_NAME=${GDRIVE_ROOT_FOLDER_NAME:-РһРҝР»Р°СӮСӢ РҡРҫРјРјРөСҖСҒСӢ}
      # РһРәРҪРҫ РҝРҫ РҙР°СӮРө РҫРҝР»Р°СӮСӢ РҙР»СҸ РҙРөСӮРөРәСӮР° (РҙРҪРё). РҳРҪР°СҮРө РҝРөСҖРІСӢР№ РҝСҖРҫРіРҫРҪ РҝРҫРҙС…РІР°СӮРёСӮ
      # РІСҒСҺ РёСҒСӮРҫСҖРёСҺ won-СҒРҙРөР»РҫРә. РңРөРҪСҸР№ РұРөР· РҝРөСҖРөРҙРөРҝР»РҫСҸ РәРҫРҙР°.
      - EXPORT_SINCE_DAYS=${EXPORT_SINCE_DAYS:-5}

      # eNPS вҖ” Р°РҪРҫРҪРёРјРҪСӢР№ РҝСғР»СҢСҒ-РҫРҝСҖРҫСҒ (Typeform вҶ’ Google Sheets вҶ’ СҒРёРҪРә РІ D1).
      # GOOGLE_OAUTH_JSON = РҝРҫР»РҪСӢР№ JSON РәР»СҺСҮР° РЎР•Р Р’РҳРЎ-РҗРҡРҡРҗРЈРқРўРҗ (Sheets read-only,
      # РҪРө РҝСғСӮР°СӮСҢ СҒ OAuth-СӮСҖРҫР№РәРҫР№ РІСӢСҲРө); СӮР°РұР»РёСҶР° РҙРҫР»Р¶РҪР° РұСӢСӮСҢ СҖР°СҒСҲР°СҖРөРҪР° РҪР° РөРіРҫ
      # client_email. Р‘РөР· РҝРөСҖРөРјРөРҪРҪСӢС… СҒРёРҪРә РјРҫР»СҮРёСӮ (graceful), РІРәР»Р°РҙРәР° Р¶РёРІС‘СӮ РҪР°
      # РҝРҫСҒР»РөРҙРҪРөРј РёРјРҝРҫСҖСӮРө. ENPS_SHEET_RANGE РҫРҝСҶРёРҫРҪР°Р»РөРҪ (РҙРөС„РҫР»СӮ РІ РәРҫРҙРө).
      - GOOGLE_OAUTH_JSON=${GOOGLE_OAUTH_JSON}
      - ENPS_SPREADSHEET_ID=${ENPS_SPREADSHEET_ID}
      - ENPS_SHEET_RANGE=${ENPS_SHEET_RANGE}

      # Telegram вҖ” MTProto for usernameвҶ’id resolution in manager sync,
      # plus Bot API tokens for /login resolution (at least one required).
      - TELEGRAM_API_ID=${TELEGRAM_API_ID}
      - TELEGRAM_API_HASH=${TELEGRAM_API_HASH}
      - TELEGRAM_SESSION=${TELEGRAM_SESSION}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_OKK_BOT_TOKEN=${TELEGRAM_OKK_BOT_TOKEN}
      # РҹСҖРҫРёРіСҖСӢРІР°РҪРёРө РіРҫР»РҫСҒРҫРІСӢС… В«Р Р°Р·РұРҫСҖРҫРІ РһРЎВ» вҖ” РҝСҖРҫРәСҒРё РәР°СҮР°РөСӮ С„Р°Р№Р» СҮРөСҖРөР· Bot API.
      # OKK-РұРҫСӮ (СҖРөР°Р»СҢРҪСӢРө Р·РІРҫРҪРәРё, D2) / D1-РұРҫСӮ (AI Р РҫР»РөРІРәРё). Р•СҒР»Рё СҒРҫРІРҝР°РҙР°СҺСӮ СҒ
      # РұРҫСӮР°РјРё РІСӢСҲРө вҖ” РјРҫР¶РҪРҫ РҪРө Р·Р°РҙР°РІР°СӮСҢ: РәРҫРҙ С„РҫР»РұСҚСҮРёСӮ РҪР° TELEGRAM_OKK_BOT_TOKEN /
      # TELEGRAM_BOT_TOKEN СҒРҫРҫСӮРІРөСӮСҒСӮРІРөРҪРҪРҫ.
      - OKK_TELEGRAM_BOT_TOKEN=${OKK_TELEGRAM_BOT_TOKEN}
      - D1_TELEGRAM_BOT_TOKEN=${D1_TELEGRAM_BOT_TOKEN}

      # Discord webhook for user-submitted bug reports ("РЎРҫРҫРұСүРёСӮСҢ РҫРұ РҫСҲРёРұРәРө").
      # Must be set in Dokploy; the server only sends to Discord if present.
      - DISCORD_BUG_REPORT_WEBHOOK_URL=${DISCORD_BUG_REPORT_WEBHOOK_URL}
      # Discord webhook for call-evaluation complaints (/api/error-report).
      # Without this whitelist entry the var is invisible in the container and
      # error-report/route.ts falls back to a hardcoded URL (to be removed).
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL}
    restart: unless-stopped
    networks:
      - sternmeister-network
      - dokploy-network

  # MCP server вҖ” exposes curated dashboard tools to Claude Desktop / Claude Code
  # at https://mcp.sternmeister.online. Bearer-token auth, read-only Neon access,
  # all calls audited to D1.mcp_audit_log. See docs/MCP-IMPLEMENTATION-PLAN.md.
  mcp:
    build:
      context: .
      dockerfile: mcp-server/Dockerfile
    ports:
      - "${MCP_HOST_PORT:-3009}:3009"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=3009
      - TZ=${TZ:-Europe/Berlin}
      # Bearer-token map вҖ” JSON array of { token, userId, name, role, depts, issued }.
      # Rotation: change Dokploy env value and restart this service.
      - MCP_BEARER_TOKENS=${MCP_BEARER_TOKENS}
      # DB URLs вҖ” phase 2 still reuses dashboard creds; phase 3 swaps to dedicated
      # mcp_readonly_* roles (MCP_*_RO_URL). Audit log inserts into D1, requires
      # write on D1.mcp_audit_log only.
      - DATABASE_URL=${DATABASE_URL}
      - R1_DATABASE_URL=${R1_DATABASE_URL}
      - D2_OKK_DATABASE_URL=${D2_OKK_DATABASE_URL}
      - R2_OKK_DATABASE_URL=${R2_OKK_DATABASE_URL}
      - ANALYTICS_DATABASE_URL=${ANALYTICS_DATABASE_URL}
      - TRACKING_DATABASE_URL=${TRACKING_DATABASE_URL}
      - MCP_D1_RO_URL=${MCP_D1_RO_URL}
      - MCP_R1_RO_URL=${MCP_R1_RO_URL}
      - MCP_D2_RO_URL=${MCP_D2_RO_URL}
      - MCP_R2_RO_URL=${MCP_R2_RO_URL}
      - MCP_ANALYTICS_RO_URL=${MCP_ANALYTICS_RO_URL}
      - MCP_TRACKING_RO_URL=${MCP_TRACKING_RO_URL}
      # Sentry вҖ” optional (set DSN to enable).
      - SENTRY_DSN=${MCP_SENTRY_DSN}
      # CORS / DNS-rebinding guard вҖ” comma-separated list of allowed Origin
      # headers for browser clients. Empty/missing Origin (Claude Desktop,
      # curl, native MCP clients) is always allowed. Default applied in
      # src/index.ts: 'https://mcp.sternmeister.online,https://claude.ai'.
      - MCP_ALLOWED_ORIGINS=${MCP_ALLOWED_ORIGINS}
    restart: unless-stopped
    networks:
      - sternmeister-network
      - dokploy-network

  # ETL cron вҖ” calls /api/analytics/sync/cron every SYNC_INTERVAL_SECONDS
  # (default 600s = 10 min). Pulls Kommo вҶ’ Neon analytics incrementally.
  # Talks to `app` over the internal docker network, not the public host.
  etl-cron:
    image: curlimages/curl:8.7.1
    restart: unless-stopped
    depends_on:
      - app
    environment:
      - CRON_SECRET=${CRON_SECRET}
      - SYNC_INTERVAL_SECONDS=${SYNC_INTERVAL_SECONDS:-600}
      - SYNC_START_DELAY_SECONDS=${SYNC_START_DELAY_SECONDS:-30}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "[etl-cron] starting, interval=$${SYNC_INTERVAL_SECONDS}s";
        sleep "$${SYNC_START_DELAY_SECONDS}";
        while true; do
          ts="$$(date -u +%Y-%m-%dT%H:%M:%SZ)";
          http_status="$$(curl -sS -o /tmp/sync.out -w '%{http_code}' --max-time 290 \
            -H "x-cron-secret: $${CRON_SECRET}" \
            http://app:3008/api/analytics/sync/cron || echo '000')";
          echo "[etl-cron] $${ts} http=$${http_status} body=$$(head -c 200 /tmp/sync.out)";
          # Call-export worker: drain a few pending won/installment exports вҶ’
          # Google Drive. Detect step (inside the sync above) queues them.
          exp_status="$$(curl -sS -o /tmp/export.out -w '%{http_code}' --max-time 290 \
            -H "x-cron-secret: $${CRON_SECRET}" \
            http://app:3008/api/exports/process/tick || echo '000')";
          echo "[etl-cron] $${ts} export http=$${exp_status} body=$$(head -c 200 /tmp/export.out)";
          sleep "$${SYNC_INTERVAL_SECONDS}";
        done
    networks:
      - sternmeister-network

  # Analysis cron вҖ” calls /api/analysis/process/tick every ANALYSIS_TICK_SECONDS
  # (default 60s). The tick claims at most one analysis job (global single-
  # flight FIFO, see src/lib/analysis/worker.ts) and runs one ~20-min chunk of
  # the transcription/analysis pipeline. Without this service, analysis jobs
  # only progress while someone keeps the РҗРҪР°Р»РёР· tab open in a browser.
  # The tick itself answers in <1s ({claimed|idle}); the chunk runs detached.
  analysis-cron:
    image: curlimages/curl:8.7.1
    restart: unless-stopped
    depends_on:
      - app
    environment:
      - CRON_SECRET=${CRON_SECRET}
      - ANALYSIS_TICK_SECONDS=${ANALYSIS_TICK_SECONDS:-60}
      - ANALYSIS_START_DELAY_SECONDS=${ANALYSIS_START_DELAY_SECONDS:-20}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "[analysis-cron] starting, interval=$${ANALYSIS_TICK_SECONDS}s";
        sleep "$${ANALYSIS_START_DELAY_SECONDS}";
        while true; do
          ts="$$(date -u +%Y-%m-%dT%H:%M:%SZ)";
          http_status="$$(curl -sS -o /tmp/tick.out -w '%{http_code}' --max-time 30 \
            -H "x-cron-secret: $${CRON_SECRET}" \
            http://app:3008/api/analysis/process/tick || echo '000')";
          echo "[analysis-cron] $${ts} http=$${http_status} body=$$(head -c 200 /tmp/tick.out)";
          sleep "$${ANALYSIS_TICK_SECONDS}";
        done
    networks:
      - sternmeister-network

  # eNPS cron вҖ” СҒРёРҪРәР°РөСӮ Google-СӮР°РұР»РёСҶСғ (Typeform вҶ’ Sheets) РІ D1 СҖР°Р· РІ СҮР°СҒ.
  # Р‘РөР· РҪРөРіРҫ eNPS РҫРұРҪРҫРІР»СҸРөСӮСҒСҸ СӮРҫР»СҢРәРҫ РҝСҖРё РҫСӮРәСҖСӢСӮРёРё РІРәР»Р°РҙРәРё (С„РҫРҪРҫРІСӢР№ on-GET
  # СӮСҖРёРіРіРөСҖ, throttle 30 РјРёРҪ/РҝСҖРҫСҶРөСҒСҒ) вҖ” РҙР°РҪРҪСӢРө РҝРҫРҙСӮСғС…Р°СҺСӮ Рё РҝР°РҙРөРҪРёСҸ РҪРө РІРёРҙРҪСӢ.
  # Р Р°Р· РІ СҮР°СҒ РҙРҫСҒСӮР°СӮРҫСҮРҪРҫ: ~РҙРөСҒСҸСӮРҫРә РҫСӮРІРөСӮРҫРІ РІ РҪРөРҙРөР»СҺ. РһСҲРёРұРәРё СҒРёРҪРәР° РҝРҫРҝР°РҙР°СҺСӮ РІ
  # Р»РҫРі СҚСӮРҫРіРҫ СҒРөСҖРІРёСҒР° (http!=200), СӮР°Рә СҮСӮРҫ РҝСҖРҫРұР»РөРјСғ РІРёРҙРҪРҫ СҒСҖР°Р·Сғ.
  enps-cron:
    image: curlimages/curl:8.7.1
    restart: unless-stopped
    depends_on:
      - app
    environment:
      - CRON_SECRET=${CRON_SECRET}
      - ENPS_SYNC_INTERVAL_SECONDS=${ENPS_SYNC_INTERVAL_SECONDS:-3600}
      - ENPS_START_DELAY_SECONDS=${ENPS_START_DELAY_SECONDS:-45}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "[enps-cron] starting, interval=$${ENPS_SYNC_INTERVAL_SECONDS}s";
        sleep "$${ENPS_START_DELAY_SECONDS}";
        while true; do
          ts="$$(date -u +%Y-%m-%dT%H:%M:%SZ)";
          http_status="$$(curl -sS -o /tmp/enps.out -w '%{http_code}' --max-time 60 \
            -H "x-cron-secret: $${CRON_SECRET}" \
            http://app:3008/api/analytics/sync/enps || echo '000')";
          echo "[enps-cron] $${ts} http=$${http_status} body=$$(head -c 200 /tmp/enps.out)";
          sleep "$${ENPS_SYNC_INTERVAL_SECONDS}";
        done
    networks:
      - sternmeister-network

  # Optional: Local PostgreSQL for development
  # Uncomment if you want to use local database instead of Neon
  # postgres:
  #   image: postgres:16-alpine
  #   container_name: sternmeister-postgres
  #   ports:
  #     - "5432:5432"
  #   environment:
  #     POSTGRES_DB: sternmeister_db
  #     POSTGRES_USER: postgres
  #     POSTGRES_PASSWORD: postgres
  #   volumes:
  #     - postgres-data:/var/lib/postgresql/data
  #   networks:
  #     - sternmeister-network
  #   restart: unless-stopped

networks:
  sternmeister-network:
    driver: bridge
  dokploy-network:
    external: true

# volumes:
#   postgres-data:
